# Explicitly declare Node.js so Nixpacks doesn't auto-detect Deno.
# The package.json that drives pnpm lives inside "Clientory App/", not at the
# repo root, which is why auto-detection fails.
#
# We install pnpm via npm rather than corepack because there is no
# packageManager field in package.json, which causes corepack to stall
# or fail in CI when trying to resolve the correct pnpm version.
providers = []

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# pnpm@11 requires Node.js >=22.13; pnpm@10 supports >=18 and reads v9 lockfiles.
# Combine into one cmd so pnpm is on PATH when install-railway.sh runs
# (separate Docker RUN layers don't inherit each other's installed binaries reliably).
cmds = ["npm install -g pnpm@10 && sh ./install-railway.sh"]

[phases.build]
cmds = ["sh ./build-railway.sh"]

[start]
cmd = "sh ./start-railway.sh"
