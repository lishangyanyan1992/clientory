kind = "web"
previewPath = "/"
title = "Clientory – AI Visibility Scanner"
version = "1.0.0"
id = "artifacts/clientory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21585
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/clientory run dev"

[services.env]
PORT = "21585"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/clientory", "run", "build"]
publicDir = "artifacts/clientory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
